<!DOCTYPE html>
<html>
<body>
    <h1>NimaDev DP Site</h1>
    <input type="text" id="num" placeholder="WhatsApp Number">
    <input type="text" id="img" placeholder="Image URL">
    <button onclick="generate()">Generate Pair Code</button>
    <div id="codeDisplay"></div>

    <script>
        async function generate() {
            const res = await fetch('/generate', {
                method: 'POST',
                body: JSON.stringify({ number: document.getElementById('num').value, imageUrl: document.getElementById('img').value }),
                headers: { 'Content-Type': 'application/json' }
            });
            const data = await res.json();
            document.getElementById('codeDisplay').innerText = "Pair Code: " + data.code;
        }
    </script>
</body>
</html>
